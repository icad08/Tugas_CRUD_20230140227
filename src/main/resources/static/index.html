<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Manajemen KTP</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<div class="container">
    <h1>Sistem Manajemen KTP</h1>

    <div id="message" class="message-box" style="display: none;"></div>

    <div class="form-section">
        <h3 id="formTitle">Tambah Data KTP</h3>
        <form id="ktpForm">
            <input type="hidden" id="ktpId">

            <div class="form-group">
                <label>Nomor KTP (NIK):</label>
                <input type="text" id="nomorKtp" placeholder="Wajib 16 Digit Angka" required maxlength="16" pattern="\d{16}" title="Harus 16 digit angka">
            </div>

            <div class="form-group">
                <label>Nama Lengkap:</label>
                <input type="text" id="namaLengkap" placeholder="Masukkan Nama Lengkap" required>
            </div>

            <div class="form-group">
                <label>Alamat:</label>
                <textarea id="alamat" rows="3" placeholder="Masukkan Alamat Lengkap" required></textarea>
            </div>

            <div class="form-group">
                <label>Tanggal Lahir:</label>
                <input type="date" id="tanggalLahir" required>
            </div>

            <div class="form-group">
                <label>Jenis Kelamin:</label>
                <select id="jenisKelamin" required>
                    <option value="">-- Pilih Jenis Kelamin --</option>
                    <option value="Laki-laki">Laki-laki</option>
                    <option value="Perempuan">Perempuan</option>
                </select>
            </div>

            <div class="form-actions">
                <button type="submit" id="btnSubmit" class="btn-primary">Simpan Data</button>
                <button type="button" id="btnCancel" class="btn-secondary" style="display:none;">Batal Edit</button>
            </div>
        </form>
    </div>

    <div class="table-section">
        <h3>Daftar KTP Terdaftar</h3>
        <table>
            <thead>
            <tr>
                <th>No</th>
                <th>NIK</th>
                <th>Nama Lengkap</th>
                <th>Alamat</th>
                <th>Tgl Lahir</th>
                <th>Gender</th>
                <th>Aksi</th>
            </tr>
            </thead>
            <tbody id="ktpTableBody">
            <tr><td colspan="7" style="text-align: center;">Memuat data...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
